<!DOCTYPE html>
<html>
<head>
    <title>Musica para DAA</title>
    <meta charset="UTF-8">

    <style>
        body {
            background-color: #FDF5E6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            line-height: 50px;
            padding: 0 15px;
            font-size: 2em;
        }

        .product-form {
            text-align: center;
            margin: 30px auto;
            background-color: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 900px;
        }

        select,
        input[type="text"] {
            padding: 8px;
            margin: 0 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .buttons-container {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
            font-family: inherit;
        }

        .btn-primary {
            background-color: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background-color: #2196F3;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: #ccc;
            margin: 20px 0;
        }

        th {
            vertical-align: middle;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <table align="center" border="0">
            <tr>
                <th><img src="img/musica.png" width="50" height="50"></th>
                <th><h1>Musica para DAA</h1></th>
                <th><img src="img/musica.png" width="50" height="50"></th>
            </tr>
        </table>
    </div>

    <hr>

    <div class="product-form">
        <form action="servlet/tienda" method="post">
            <p>
                <b>CD:</b>
                <select name="cd">
                    <option>Yuan | The Guo Brothers | China | $14.95</option>
                    <option>Drums of Passion | Babatunde Olatunji | Nigeria | $16.95</option>
                    <option>Kaira | Tounami Diabate| Mali | $16.95</option>
                    <option>The Lion is Loose | Eliades Ochoa | Cuba | $13.95</option>
                    <option>Dance the Devil Away | Outback | Australia | $14.95</option>
                    <option>Record of Changes | Samulnori | Korea | $12.95</option>
                    <option>Djelika | Tounami Diabate | Mali | $14.95</option>
                    <option>Rapture | Nusrat Fateh Ali Khan | Pakistan | $12.95</option>
                    <option>Cesaria Evora | Cesaria Evora | Cape Verde | $16.95</option>
                    <option>DAA | GSTIC | Spain | $50.00</option>
                    <option>How Did I Get Here? | Louis Tomlinson | UK | $19.99</option>
                    <option>Walls | Louis Tomlinson | UK | $14.95</option>
                    <option>Faith in the Future | Louis Tomlinson | UK | $18.99</option>
                </select>

                <b>Cantidad:</b>
                <input type="text" name="cantidad" value="1" size="3">
            </p>

            <div class="buttons-container">
				<button type="submit" class="btn btn-primary">Selecciona Producto</button>
				<a href="servlet/tienda?accion=verCarrito" class="btn btn-secondary">Ver Carrito</a>
			</div>
        </form>
    </div>
    <hr>
</body>
</html>
